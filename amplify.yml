version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd v2
        - npm ci
    build:
      commands:
        - cd v2
        - npm run build
  artifacts:
    baseDirectory: v2/dist
    files:
      - '**/*'
  cache:
    paths:
      - v2/node_modules/**/*
  customRules:
    - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
      target: /index.html
      status: '200'
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: X-Frame-Options
          value: DENY
        - key: X-Content-Type-Options
          value: nosniff
        - key: Referrer-Policy
          value: strict-origin-when-cross-origin
    - pattern: '/assets/**'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
